services:
  app:
    build: .
    depends_on:
      db_migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    ports:
      - "${SYSTEM_PORT}:${SYSTEM_PORT}"
    environment:
      - SYSTEM_PORT=${SYSTEM_PORT}
      - CONFIG_PATH=${CONFIG_PATH}
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
    networks:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      # BIND_HOST defaults to 0.0.0.0 (local dev). In production setup_server.sh
      # writes BIND_HOST=<tailscale-ip> to .env so redis is only reachable via
      # the private tailnet and not the public internet.
      - "${BIND_HOST:-0.0.0.0}:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend
      - bridge_net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${BIND_HOST:-0.0.0.0}:${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d providerdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    env_file:
      - .env
    networks:
      - backend
      - bridge_net

  db_migrate:
    image: migrate/migrate:4
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./db:/db
    restart: on-failure
    command:
      [
        "-path", "/db",
        "-database",
        "postgres://${DB_USER}:${DB_PASSWORD}@db:${DB_PORT}/${DB_NAME}?sslmode=disable",
        "up"
      ]
    networks:
      - backend

networks:
  backend:
  bridge_net:
    name: mtpa_bridge

volumes:
  postgres_data:
